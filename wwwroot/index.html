<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Chat - MCP Brazil Politicians</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --user: #2563eb;
      --assistant: #ffffff;
      --assistant-border: #d1d5db;
      --error: #991b1b;
      --error-bg: #fee2e2;
      --success: #166534;
      --success-bg: #dcfce7;
      --code-bg: #0f172a;
      --code-text: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
    }

    .app {
      width: min(960px, 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: #111827;
      color: white;
    }

    header h1 { margin: 0; font-size: 20px; }
    header p { margin: 4px 0 0; color: #d1d5db; font-size: 14px; }

    .status {
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      background: #f9fafb;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message-row { display: flex; }
    .message-row.user { justify-content: flex-end; }
    .message-row.assistant, .message-row.system, .message-row.progress { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 15px;
    }

    .user .bubble {
      background: var(--user);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: var(--assistant);
      border: 1px solid var(--assistant-border);
      border-bottom-left-radius: 4px;
    }

    .system .bubble {
      background: #f9fafb;
      color: var(--muted);
      border: 1px dashed var(--border);
      font-size: 14px;
    }

    .progress .bubble {
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      border-bottom-left-radius: 4px;
      color: #334155;
      min-width: min(620px, 82%);
    }

    .progress-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .progress-title.done { color: var(--success); }
    .progress-title.failed { color: var(--error); }

    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid #cbd5e1;
      border-top-color: var(--primary);
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .progress-list {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      white-space: normal;
    }

    .progress-list li { margin: 4px 0; }
    .progress-list .ok { color: var(--success); }
    .progress-list .fail { color: var(--error); }

    .simple-answer-title { font-weight: 700; margin-bottom: 8px; }
    .simple-answer-list { margin: 0; padding-left: 22px; white-space: normal; }
    .simple-answer-list li { margin: 6px 0; }
    .answer-muted { color: var(--muted); font-size: 13px; margin-top: 8px; }

    .error .bubble {
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid #fecaca;
    }

    details { margin-top: 10px; }
    summary { cursor: pointer; color: var(--primary); font-weight: 700; margin-bottom: 8px; }

    pre {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
      font-size: 13px;
    }

    form {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--border);
      background: #ffffff;
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font: inherit;
      outline: none;
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 0 18px;
      background: var(--primary);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--primary-hover); }
    button:disabled { background: #9ca3af; cursor: not-allowed; }

    .hint {
      padding: 0 14px 12px;
      color: var(--muted);
      font-size: 12px;
      background: #ffffff;
    }

    @media (max-width: 640px) {
      .bubble { max-width: 94%; }
      .progress .bubble { min-width: 94%; }
      form { padding: 10px; }
      button { padding: 0 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Chat MCP Brazil Politicians</h1>
      <p>Faça perguntas em linguagem natural. A tela exibe prompt enviado, ferramenta, argumentos e resposta.</p>
    </header>

    <div id="status" class="status">Carregando configurações...</div>
    <main id="messages" class="messages"></main>

    <form id="chatForm">
      <textarea id="prompt" rows="1" placeholder="Ex: votos de cada deputado na votação 123456" autocomplete="off"></textarea>
      <button id="sendButton" type="submit">Enviar</button>
    </form>

    <div class="hint">
      Exemplos: “liste as últimas votações”, “retorne os votos de cada deputado da votação 123456”, “despesas da deputada Erika Hilton”.
    </div>
  </div>

  <script>
    let chatEndpoint = "/api/chat";
    let chatProvider = "ollama";

    const messagesEl = document.getElementById("messages");
    const statusEl = document.getElementById("status");
    const formEl = document.getElementById("chatForm");
    const promptEl = document.getElementById("prompt");
    const sendButtonEl = document.getElementById("sendButton");

    formEl.addEventListener("submit", async event => {
      event.preventDefault();
      await submitPrompt();
    });

    promptEl.addEventListener("keydown", event => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        formEl.requestSubmit();
      }
    });

    promptEl.addEventListener("input", () => {
      promptEl.style.height = "auto";
      promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + "px";
    });

    loadClientSettings();

    async function loadClientSettings() {
      try {
        const response = await fetch("/api/client-settings", { headers: { "Accept": "application/json" } });
        if (response.ok) {
          const settings = await response.json();
          chatEndpoint = settings.chatEndpoint || chatEndpoint;
          chatProvider = settings.chatProvider || chatProvider;
        }
      } catch {
        // Mantém defaults locais caso as configurações não carreguem.
      }

      statusEl.textContent = "Chat pronto. Provedor: " + chatProvider + ".";
      addMessage("system", "Chat conectado ao backend. Provedor configurado: " + chatProvider + ".");
    }

    async function submitPrompt() {
      const prompt = promptEl.value.trim();
      if (!prompt) return;

      const requestPayload = { prompt };
      promptEl.value = "";
      promptEl.style.height = "auto";
      addMessage("user", prompt);
      setBusy(true);

      const progress = addProgressLog(prompt, requestPayload);

      try {
        progress.add("Prompt enviado para o backend: " + prompt);
        progress.add("Payload HTTP enviado: " + JSON.stringify(requestPayload));
        progress.add("Endpoint chamado: POST " + chatEndpoint + ".");

        const estimatedTimers = startEstimatedProgress(progress);

        const response = await fetch(chatEndpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(requestPayload)
        });

        stopEstimatedProgress(estimatedTimers);
        progress.add("Resposta HTTP recebida: " + response.status + " " + response.statusText + ".");

        const rawText = await response.text();
        progress.add("Resposta bruta recebida. Tamanho: " + rawText.length + " caracteres.");

        let payload;
        try {
          payload = rawText ? JSON.parse(rawText) : null;
          progress.add("Resposta JSON interpretada com sucesso.");
        } catch {
          payload = { answer: rawText };
          progress.add("Resposta não era JSON; tratando como texto.");
        }

        if (!response.ok) {
          const message = payload?.detail || payload?.title || payload?.error || rawText || "Erro desconhecido.";
          progress.add("Resposta de erro do backend: " + truncateText(message, 500), "fail");
          progress.addRaw("Resposta bruta do erro", rawText);
          progress.fail("Erro retornado pelo backend.");
          throw new Error(message);
        }

        if (payload?.tool) {
          progress.add("Tool chamada pelo backend: " + payload.tool + ".");
        } else {
          progress.add("Nenhuma tool foi informada na resposta; possivelmente foi resposta direta do modelo.");
        }

        if (payload?.arguments) {
          progress.add("Argumentos da tool: " + JSON.stringify(payload.arguments) + ".");
        }

        if (payload?.logFilePath) {
          progress.add("Arquivo de log do prompt no backend: " + payload.logFilePath + ".");
        }

        if (payload?.answer) {
          progress.add("Resposta final formatada: " + truncateText(payload.answer, 900));
        }

        progress.addRaw("Resposta JSON completa", payload);
        progress.done("Processamento concluído.");
        addAssistantResponse(payload, requestPayload, rawText);
      } catch (error) {
        progress.fail("Falha ao processar o prompt.");
        addMessage("assistant error", "Erro ao processar o prompt.\n\n" + error.message);
      } finally {
        setBusy(false);
      }
    }

    function startEstimatedProgress(progress) {
      const timers = [];
      timers.push(setTimeout(() => progress.add("Provider analisando intenção do prompt: " + chatProvider + "."), 400));
      timers.push(setTimeout(() => progress.add("Planejando consulta e selecionando tool."), 1200));
      timers.push(setTimeout(() => progress.add("Consultando dados públicos da Câmara dos Deputados."), 2400));
      timers.push(setTimeout(() => progress.add("Formatando resposta final."), 4200));
      timers.push(setTimeout(() => progress.add("Ainda processando. Modelos locais podem demorar mais dependendo do hardware."), 8000));
      return timers;
    }

    function stopEstimatedProgress(timers) {
      for (const timer of timers) clearTimeout(timer);
    }

    function addProgressLog(prompt, requestPayload) {
      const row = document.createElement("div");
      row.className = "message-row progress";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const title = document.createElement("div");
      title.className = "progress-title";
      title.innerHTML = "<span class=\"spinner\"></span><span>Executando...</span>";

      const meta = document.createElement("div");
      meta.className = "progress-meta";

      const list = document.createElement("ol");
      list.className = "progress-list";

      const rawDetails = document.createElement("details");
      const rawSummary = document.createElement("summary");
      rawSummary.textContent = "Ver log técnico da execução";
      const rawPre = document.createElement("pre");
      rawPre.textContent = JSON.stringify({ prompt, requestPayload }, null, 2);
      rawDetails.appendChild(rawSummary);
      rawDetails.appendChild(rawPre);

      bubble.appendChild(title);
      bubble.appendChild(meta);
      bubble.appendChild(list);
      bubble.appendChild(rawDetails);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      const rawLog = [{ etapa: "prompt_ui", timestamp: new Date().toISOString(), prompt, requestPayload }];
      const startedAt = Date.now();
      const elapsedTimer = setInterval(() => {
        meta.textContent = "Tempo decorrido: " + formatElapsed(Date.now() - startedAt) + ". Prompt: “" + truncateText(prompt, 80) + "”";
      }, 250);

      const add = (text, cssClass) => {
        rawLog.push({ etapa: "log", timestamp: new Date().toISOString(), text });
        const item = document.createElement("li");
        if (cssClass) item.className = cssClass;
        item.textContent = timestamp() + " " + text;
        list.appendChild(item);
        rawPre.textContent = JSON.stringify(rawLog, null, 2);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      };

      const addRaw = (label, value) => {
        rawLog.push({ etapa: label, timestamp: new Date().toISOString(), value });
        rawPre.textContent = JSON.stringify(rawLog, null, 2);
      };

      add("Prompt recebido pela interface.");

      return {
        add,
        addRaw,
        done: text => {
          clearInterval(elapsedTimer);
          title.className = "progress-title done";
          title.innerHTML = "✓ " + escapeHtml(text);
          meta.textContent = "Tempo total: " + formatElapsed(Date.now() - startedAt) + ".";
          add(text, "ok");
        },
        fail: text => {
          clearInterval(elapsedTimer);
          title.className = "progress-title failed";
          title.textContent = "Falhou";
          meta.textContent = "Tempo até a falha: " + formatElapsed(Date.now() - startedAt) + ".";
          add(text, "fail");
        }
      };
    }

    function addAssistantResponse(payload, requestPayload, rawText) {
      const answerHtml = buildReadableAnswerHtml(payload);
      const details = JSON.stringify({
        promptEnviado: requestPayload?.prompt,
        endpoint: chatEndpoint,
        provider: chatProvider,
        toolChamada: payload?.tool,
        argumentosDaTool: payload?.arguments,
        respostaFormatada: payload?.answer,
        dadosRetornados: payload?.data,
        arquivoLogBackend: payload?.logFilePath,
        respostaBrutaHttp: rawText
      }, null, 2);

      const html = answerHtml +
        "<details><summary>Ver prompt, tool e resposta</summary><pre>" + escapeHtml(details) + "</pre></details>";

      addMessageHtml("assistant", html);
    }

    function buildReadableAnswerHtml(payload) {
      const camaraData = payload?.data?.dados;
      if (payload?.tool === "search_deputados" && Array.isArray(camaraData)) return renderDeputadosList(camaraData, payload?.arguments);
      const parsedAnswer = parseJsonLikeAnswer(payload?.answer);
      if (Array.isArray(parsedAnswer)) return renderGenericObjectList(parsedAnswer);
      return renderPlainText(payload?.answer || "Sem resposta.");
    }

    function renderDeputadosList(deputados, args) {
      const sorted = [...deputados].sort((a, b) => String(a?.nome || "").localeCompare(String(b?.nome || ""), "pt-BR"));
      if (sorted.length === 0) return "<p>Não encontrei deputados com os filtros usados.</p>";
      const titleParts = [];
      if (args?.siglaUf) titleParts.push("UF " + args.siglaUf);
      if (args?.siglaPartido) titleParts.push("partido " + args.siglaPartido);
      const title = titleParts.length > 0 ? "Deputados encontrados — " + titleParts.join(", ") : "Deputados encontrados";
      const items = sorted.map(item => {
        const nome = escapeHtml(item?.nome || "Sem nome");
        const partido = item?.siglaPartido ? " — " + escapeHtml(item.siglaPartido) : "";
        const uf = item?.siglaUf ? "/" + escapeHtml(item.siglaUf) : "";
        return "<li><strong>" + nome + "</strong>" + partido + uf + "</li>";
      }).join("");
      return "<div class=\"simple-answer-title\">" + escapeHtml(title) + "</div><ol class=\"simple-answer-list\">" + items + "</ol><div class=\"answer-muted\">Resultado ordenado alfabeticamente pelo nome.</div>";
    }

    function renderGenericObjectList(items) {
      if (items.length === 0) return "<p>Nenhum item encontrado.</p>";
      const normalizedItems = items.map(item => typeof item === "object" && item !== null ? item : { valor: item });
      const sorted = [...normalizedItems].sort((a, b) => String(a.nome || a.name || a.titulo || a.valor || "").localeCompare(String(b.nome || b.name || b.titulo || b.valor || ""), "pt-BR"));
      const htmlItems = sorted.map(item => {
        const label = item.nome || item.name || item.titulo || item.valor || JSON.stringify(item);
        const details = Object.entries(item).filter(([key]) => !["nome", "name", "titulo", "valor"].includes(key)).map(([key, value]) => key + ": " + value).join(" — ");
        return "<li><strong>" + escapeHtml(label) + "</strong>" + (details ? " — " + escapeHtml(details) : "") + "</li>";
      }).join("");
      return "<div class=\"simple-answer-title\">Resultado</div><ol class=\"simple-answer-list\">" + htmlItems + "</ol>";
    }

    function renderPlainText(text) {
      const cleanText = stripMarkdownJsonFence(text);
      const parsed = parseJsonLikeAnswer(cleanText);
      if (Array.isArray(parsed)) return renderGenericObjectList(parsed);
      return "<div>" + escapeHtml(cleanText).replace(/\n/g, "<br>") + "</div>";
    }

    function parseJsonLikeAnswer(value) {
      const text = stripMarkdownJsonFence(value).trim();
      if (!text) return null;
      const startIndex = Math.min(text.indexOf("[") === -1 ? Number.MAX_SAFE_INTEGER : text.indexOf("["), text.indexOf("{") === -1 ? Number.MAX_SAFE_INTEGER : text.indexOf("{"));
      if (startIndex === Number.MAX_SAFE_INTEGER) return null;
      try { return JSON.parse(text.substring(startIndex).trim()); } catch { return null; }
    }

    function stripMarkdownJsonFence(value) {
      let text = String(value || "").trim();
      text = text.replace(/^```(?:json)?\s*/i, "");
      text = text.replace(/```$/i, "");
      return text.trim();
    }

    function addMessage(type, text) { addMessageHtml(type, escapeHtml(text)); }

    function addMessageHtml(type, html) {
      const row = document.createElement("div");
      row.className = "message-row " + type;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = html;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setBusy(isBusy) {
      sendButtonEl.disabled = isBusy;
      promptEl.disabled = isBusy;
      statusEl.textContent = isBusy ? "Pensando com " + chatProvider + "..." : "Chat pronto. Provedor: " + chatProvider + ".";
    }

    function timestamp() {
      return new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function formatElapsed(milliseconds) {
      const seconds = milliseconds / 1000;
      return seconds.toFixed(seconds < 10 ? 1 : 0) + "s";
    }

    function truncateText(value, maxLength) {
      const text = String(value || "");
      return text.length <= maxLength ? text : text.substring(0, maxLength) + "...";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
